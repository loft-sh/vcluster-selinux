# selint config for vcluster-selinux.
#
# We ship a small standalone module that references types from
# container-selinux (declared via gen_require in the .te). selint's default
# checks flag two patterns that are correct for us but would be incorrect
# for a refpolicy-integrated module:
#
#   S-001: "require block used in te file" — gen_require IS how standalone
#          modules declare external types; there is no interface to call.
#   E-005: "nonexistent type listed in fc_entry" — selint only sees our
#          sources, not container-selinux's; all flagged types come from
#          that package (an RPM dependency, enforced at install time).
#
# Everything else is enabled at the default severity.

severity = "convention"
disable = { C-001, C-006, W-010, W-011, E-003, E-004, S-001, E-005 }
enable_source = { W-010, W-011, E-003, E-004 }
assume_users = { system_u }
assume_roles = { object_r }
ordering_rules = "refpolicy-lax"
