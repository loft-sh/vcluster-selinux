name: Release
on:
  release:
    types:
      - published

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os:
          - "el8"
          - "el9"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build
        env:
          TAG: ${{ github.ref_name }}
        run: |
          docker buildx build \
            --target result --output=. \
            --build-arg TAG="${TAG}" \
            --build-arg SCRIPT=build \
            -f Dockerfile.${{ matrix.os }} .

      - name: Sign
        env:
          TAG: ${{ github.ref_name }}
          TESTING_PRIVATE_KEY: ${{ secrets.TESTING_PRIVATE_KEY }}
          TESTING_PRIVATE_KEY_PASS_PHRASE: ${{ secrets.TESTING_PRIVATE_KEY_PASS_PHRASE }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASS_PHRASE: ${{ secrets.PRIVATE_KEY_PASS_PHRASE }}
        run: |
          echo "${TESTING_PRIVATE_KEY}" > /tmp/testing_private_key
          echo "${TESTING_PRIVATE_KEY_PASS_PHRASE}" > /tmp/testing_private_key_pass_phrase
          echo "${PRIVATE_KEY}" > /tmp/private_key
          echo "${PRIVATE_KEY_PASS_PHRASE}" > /tmp/private_key_pass_phrase
          docker buildx build \
            --target result --output=. \
            --build-arg TAG="${TAG}" \
            --build-arg SCRIPT=sign \
            --secret id=testing_private_key,src=/tmp/testing_private_key \
            --secret id=testing_private_key_pass_phrase,src=/tmp/testing_private_key_pass_phrase \
            --secret id=private_key,src=/tmp/private_key \
            --secret id=private_key_pass_phrase,src=/tmp/private_key_pass_phrase \
            -f Dockerfile.${{ matrix.os }} .
          rm -f /tmp/testing_private_key /tmp/testing_private_key_pass_phrase /tmp/private_key /tmp/private_key_pass_phrase

      - name: Checksum
        run: |
          find dist/${{ matrix.os }}/noarch/*.rpm -type f | while read -r file; do
            sha256sum "$file" | awk '{print $1 "  " $2}' >> "sha256sum-${{ matrix.os }}-noarch.txt"
          done

          find dist/${{ matrix.os }}/source/*.rpm -type f | while read -r file; do
            sha256sum "$file" | awk '{print $1 "  " $2}' >> "sha256sum-${{ matrix.os }}-source.txt"
          done

      - name: Upload to GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" dist/${{ matrix.os }}/noarch/* dist/${{ matrix.os }}/source/*

      - name: Install createrepo_c
        run: |
          sudo apt-get update
          sudo apt-get install -y createrepo-c

      - name: Derive channel
        run: |
          CHANNEL=$(echo "${{ github.ref_name }}" | sed -E 's/^v[0-9]+\.[0-9]+[-~a-zA-Z0-9]*\.([a-z]+)\.[0-9]+$/\1/')
          if ! [[ "$CHANNEL" =~ ^[a-z]+$ ]]; then
            echo "failed to derive release channel from tag: ${{ github.ref_name }}" >&2
            exit 1
          fi
          echo "CHANNEL=$CHANNEL" >> "$GITHUB_ENV"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::970547378862:role/github-actions-rpm-upload
          aws-region: us-east-2

      - name: Pull existing channel RPMs
        run: |
          mkdir -p /tmp/existing-noarch /tmp/existing-source
          aws s3 sync \
            s3://vcluster-selinux-rpm/${CHANNEL}/${{ matrix.os }}/noarch/ \
            /tmp/existing-noarch/ \
            --exclude 'repodata/*'
          aws s3 sync \
            s3://vcluster-selinux-rpm/${CHANNEL}/${{ matrix.os }}/source/ \
            /tmp/existing-source/ \
            --exclude 'repodata/*'
          shopt -s nullglob
          for f in /tmp/existing-noarch/*.rpm; do
            name=$(basename "$f")
            [ -f "dist/${{ matrix.os }}/noarch/$name" ] || cp "$f" "dist/${{ matrix.os }}/noarch/$name"
          done
          for f in /tmp/existing-source/*.rpm; do
            name=$(basename "$f")
            [ -f "dist/${{ matrix.os }}/source/$name" ] || cp "$f" "dist/${{ matrix.os }}/source/$name"
          done

      - name: Generate repo metadata
        run: |
          bash .github/scripts/create-rpm-repo.sh \
            dist/${{ matrix.os }}/noarch \
            dist/${{ matrix.os }}/source

      - name: Upload RPMs to S3
        run: |
          aws s3 sync \
            dist/${{ matrix.os }}/noarch/ \
            s3://vcluster-selinux-rpm/${CHANNEL}/${{ matrix.os }}/noarch/ \
            --exclude 'repodata/*'
          aws s3 sync \
            dist/${{ matrix.os }}/source/ \
            s3://vcluster-selinux-rpm/${CHANNEL}/${{ matrix.os }}/source/ \
            --exclude 'repodata/*'

      - name: Upload repo metadata to S3
        run: |
          aws s3 sync \
            dist/${{ matrix.os }}/noarch/repodata/ \
            s3://vcluster-selinux-rpm/${CHANNEL}/${{ matrix.os }}/noarch/repodata/ \
            --delete \
            --cache-control 'no-cache, max-age=0'
          aws s3 sync \
            dist/${{ matrix.os }}/source/repodata/ \
            s3://vcluster-selinux-rpm/${CHANNEL}/${{ matrix.os }}/source/repodata/ \
            --delete \
            --cache-control 'no-cache, max-age=0'
