name: Release
on:
  release:
    types:
      - published

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os:
          - "el8"
          - "el9"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build
        env:
          TAG: ${{ github.ref_name }}
        run: |
          docker buildx build \
            --target result --output=. \
            --build-arg TAG="${TAG}" \
            --build-arg SCRIPT=build \
            -f Dockerfile.${{ matrix.os }} .

      - name: Sign
        env:
          TAG: ${{ github.ref_name }}
          TESTING_PRIVATE_KEY: ${{ secrets.TESTING_PRIVATE_KEY }}
          TESTING_PRIVATE_KEY_PASS_PHRASE: ${{ secrets.TESTING_PRIVATE_KEY_PASS_PHRASE }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASS_PHRASE: ${{ secrets.PRIVATE_KEY_PASS_PHRASE }}
        run: |
          docker buildx build \
            --target result --output=. \
            --build-arg TAG="${TAG}" \
            --build-arg SCRIPT=sign \
            --build-arg "TESTING_PRIVATE_KEY=${TESTING_PRIVATE_KEY}" \
            --build-arg "TESTING_PRIVATE_KEY_PASS_PHRASE=${TESTING_PRIVATE_KEY_PASS_PHRASE}" \
            --build-arg "PRIVATE_KEY=${PRIVATE_KEY}" \
            --build-arg "PRIVATE_KEY_PASS_PHRASE=${PRIVATE_KEY_PASS_PHRASE}" \
            -f Dockerfile.${{ matrix.os }} .

      - name: Checksum
        run: |
          find dist/${{ matrix.os }}/noarch/*.rpm -type f | while read -r file; do
            sha256sum "$file" | awk '{print $1 "  " $2}' >> "sha256sum-${{ matrix.os }}-noarch.txt"
          done

          find dist/${{ matrix.os }}/source/*.rpm -type f | while read -r file; do
            sha256sum "$file" | awk '{print $1 "  " $2}' >> "sha256sum-${{ matrix.os }}-source.txt"
          done

      - name: Upload to GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.ref_name }} dist/${{ matrix.os }}/noarch/* dist/${{ matrix.os }}/source/*
