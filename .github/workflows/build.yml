on:
  push:
    branches:
      - main
  pull_request:

name: Build
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Static policy lint (selint + sepolgen-ifgen)
        run: make lint

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: [el8, el9, el10]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build RPM
        run: make build-${{ matrix.os }}

      - name: Sign RPM (dry-run)
        run: |
          cat > /tmp/genkey <<EOF
          %no-protection
          Key-Type: RSA
          Key-Length: 2048
          Name-Real: vcluster-selinux ci dry-run
          Name-Email: ci@loft.sh
          Expire-Date: 1
          Passphrase: ci-throwaway
          %commit
          EOF
          gpg --batch --pinentry-mode loopback --gen-key /tmp/genkey
          gpg --batch --pinentry-mode loopback --passphrase ci-throwaway \
            --export-secret-keys --armor ci@loft.sh > /tmp/testing_private_key
          printf 'ci-throwaway' > /tmp/testing_private_key_pass_phrase
          : > /tmp/private_key
          : > /tmp/private_key_pass_phrase
          docker buildx build \
            --target result --output=. \
            --build-arg SCRIPT=sign \
            --secret id=testing_private_key,src=/tmp/testing_private_key \
            --secret id=testing_private_key_pass_phrase,src=/tmp/testing_private_key_pass_phrase \
            --secret id=private_key,src=/tmp/private_key \
            --secret id=private_key_pass_phrase,src=/tmp/private_key_pass_phrase \
            -f Dockerfile.${{ matrix.os }} .
          rm -f /tmp/testing_private_key /tmp/testing_private_key_pass_phrase \
                /tmp/private_key /tmp/private_key_pass_phrase /tmp/genkey

      - name: Install createrepo_c
        run: |
          sudo apt-get update
          sudo apt-get install -y createrepo-c

      - name: Verify repo metadata generation
        run: |
          bash .github/scripts/create-rpm-repo.sh \
            dist/${{ matrix.os }}/noarch \
            dist/${{ matrix.os }}/source

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.os }}
          path: dist/${{ matrix.os }}/noarch/*.rpm

  verify-rpm:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: [el8, el9, el10]
    steps:
      - uses: actions/checkout@v6

      - name: Download RPM
        uses: actions/download-artifact@v4
        with:
          name: rpm-${{ matrix.os }}
          path: dist/${{ matrix.os }}/noarch/

      - name: Verify install + contexts + rules + uninstall
        run: make verify-${{ matrix.os }}

  verify-consistency:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: policy files are identical across el8 / el9 / el10
        run: |
          for f in vcluster.te vcluster.fc vcluster.if; do
            diff policy/el8/$f policy/el9/$f
            diff policy/el9/$f policy/el10/$f
          done

      - name: el8 vs el9 spec differences are only version-related
        run: |
          # Expected-only diffs: restorecon flag, container-selinux version, release tag.
          diff policy/el8/vcluster-selinux.spec policy/el9/vcluster-selinux.spec \
            | grep "^[<>]" \
            | grep -v "restorecon" \
            | grep -v "container_policyver\|container_policy_epoch" \
            | grep -v "\.el[89]" \
            | { ! grep . ; }

      - name: el9 vs el10 spec differences are only version-related
        run: |
          # Expected-only diffs: selinux-policy / container-selinux versions, release tag, /run/flannel canonical path.
          diff policy/el9/vcluster-selinux.spec policy/el10/vcluster-selinux.spec \
            | grep "^[<>]" \
            | grep -v "^[<>] #" \
            | grep -v "selinux_policyver" \
            | grep -v "container_policyver\|container_policy_epoch" \
            | grep -v "\.el\(9\|10\)" \
            | grep -v "/var/run/flannel\|/run/flannel" \
            | { ! grep . ; }

