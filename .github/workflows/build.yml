on:
  push:
    branches:
      - main
  pull_request:

name: Build
permissions:
  contents: read

jobs:
  build-rpm-el8:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: build-rpm
      run: |
        make build-el8

  build-rpm-el9:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: build-rpm
      run: |
        make build-el9
