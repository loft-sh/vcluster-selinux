on:
  push:
    branches:
      - main
  pull_request:

name: Build
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Static policy lint (selint + sepolgen-ifgen)
        run: make lint

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: [el8, el9]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build RPM
        run: make build-${{ matrix.os }}

      - name: Install createrepo_c
        run: |
          sudo apt-get update
          sudo apt-get install -y createrepo-c

      - name: Verify repo metadata generation
        run: |
          bash .github/scripts/create-rpm-repo.sh \
            dist/${{ matrix.os }}/noarch \
            dist/${{ matrix.os }}/source

      - name: Upload RPM
        uses: actions/upload-artifact@v7
        with:
          name: rpm-${{ matrix.os }}
          path: dist/${{ matrix.os }}/noarch/*.rpm

  verify-rpm:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: [el8, el9]
    steps:
      - uses: actions/checkout@v6

      - name: Download RPM
        uses: actions/download-artifact@v8
        with:
          name: rpm-${{ matrix.os }}
          path: dist/${{ matrix.os }}/noarch/

      - name: Verify install + contexts + rules + uninstall
        run: make verify-${{ matrix.os }}

  verify-consistency:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: el8 and el9 policy files are identical
        run: |
          diff policy/el8/vcluster.te policy/el9/vcluster.te
          diff policy/el8/vcluster.fc policy/el9/vcluster.fc
          diff policy/el8/vcluster.if policy/el9/vcluster.if

      - name: spec differences are only version-related
        run: |
          # Expected-only diffs: restorecon flag, container-selinux version, release tag.
          diff policy/el8/vcluster-selinux.spec policy/el9/vcluster-selinux.spec \
            | grep "^[<>]" \
            | grep -v "restorecon" \
            | grep -v "container_policyver\|container_policy_epoch" \
            | grep -v "\.el[89]" \
            | { ! grep . ; }
