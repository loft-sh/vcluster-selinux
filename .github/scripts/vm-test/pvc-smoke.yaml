apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ci-pvc
  namespace: default
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 64Mi
---
apiVersion: v1
kind: Pod
metadata:
  name: ci-pvc-consumer
  namespace: default
spec:
  restartPolicy: Never
  containers:
    - name: c
      image: mirror.gcr.io/library/busybox:1.37.0-glibc
      command: ["sh", "-c", "echo hello > /d/msg && sleep 20"]
      volumeMounts:
        - name: v
          mountPath: /d
  volumes:
    - name: v
      persistentVolumeClaim:
        claimName: ci-pvc
